<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VocaBot — Instituto San José</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="index.html" class="back-link">← Volver al sitio</a>
  <div class="phone">
    <div class="chat-header">
      <div class="avatar avatar-img"><img src="assets/bot-avatar.jpg" alt="VocaBot" /></div>
      <div class="header-info">
        <strong>VocaBot</strong>
        <span>Orientación vocacional · Instituto San José</span>
      </div>
    </div>
    <div class="breadcrumb hidden" id="breadcrumb"></div>
    <div class="chat-body" id="chatBody"></div>
    <div class="menu-area" id="menuArea"></div>
  </div>
  <script src="data.js"></script>
  <script src="bot-engine.js"></script>
  <script>
    const bot = createBot(
      document.getElementById("chatBody"),
      document.getElementById("menuArea"),
      document.getElementById("breadcrumb")
    );
    bot.start();
  </script>
</body>
</html>
